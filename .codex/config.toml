model = "gpt-5.3-codex"
model_reasoning_effort = "medium"
personality = "pragmatic"

# --- Permissions (alternative allow: [...]) ---
approval_policy = "never" # no checks
sandbox_mode = "danger-full-access" # full access

# --- Network access ---
[sandbox_workspace_write]
network_access = true # allow net

# --- Optional (usefull for Rust) ---
[tools]
bash = true
read = true
write = true
edit = true

# --- agent settings ---
auto_fix_errors = true
run_tests_after_edit = true
