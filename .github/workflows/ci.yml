name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_NET_TIMEOUT: 60
  RUSTFLAGS: "-D warnings -D unreachable_pub -D dead_code"
  RUSTDOCFLAGS: "-D warnings"
  RUST_BACKTRACE: short

jobs:
  changed-files:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - '**/*.rs'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - 'rust-toolchain.toml'
              - '.cargo/config.toml'
              - '.config/nextest.toml'
              - 'deny.toml'
            ci:
              - '.github/workflows/**'

  fmt:
    name: Formatting
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, nightly]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: clippy-${{ matrix.toolchain }}
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  build:
    name: Build
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, nightly]
        profile: [dev, release]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: build-${{ matrix.toolchain }}-${{ matrix.profile }}
      - name: Build (${{ matrix.toolchain }}, ${{ matrix.profile }})
        run: cargo build --all-targets --all-features ${{ matrix.profile == 'release' && '--release' || '' }}
      - name: Upload artifacts (release)
        if: matrix.profile == 'release' && matrix.toolchain == 'nightly'
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: target/release/*server*
          if-no-files-found: warn
          retention-days: 7

  test:
    name: Test
    needs: [changed-files, clippy]
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Install nextest
        uses: taiki-e/install-action@cargo-nextest
      - name: Test
        run: cargo nextest run --all-targets --all-features --profile ci
        env:
          RUSTFLAGS: "-D warnings"
      - name: Doc tests
        run: cargo test --doc --all-features

  no-default-features:
    name: No default features
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, nightly]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: no-default-features-${{ matrix.toolchain }}
      - name: Check without default features (${{ matrix.toolchain }})
        run: cargo check --workspace --all-targets --no-default-features
      - name: Test without default features (${{ matrix.toolchain }})
        run: cargo test --workspace --all-targets --no-default-features

  doc:
    name: Docs
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Check docs
        run: cargo doc --all-features --no-deps --document-private-items

  msrv:
    name: MSRV
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - name: Check MSRV
        run: cargo check --all-features

  audit:
    name: Security audit
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: Cargo deny
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny
      - name: Cargo deny checks
        run: cargo deny check advisories bans licenses sources

  machete:
    name: Unused deps
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-machete
        uses: taiki-e/install-action@cargo-machete
      - run: cargo machete

  check-semver:
    name: Semver check
    needs: changed-files
    if: github.event_name == 'pull_request' && (needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@nightly
      - uses: obi1kenobi/cargo-semver-checks-action@v2

  hack:
    name: Feature matrix (cargo hack)
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-hack
        uses: taiki-e/install-action@cargo-hack
      - name: Check feature matrix
        run: cargo hack check --workspace --all-targets --feature-powerset --no-dev-deps

  udeps:
    name: Unused deps (cargo udeps)
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-udeps
        uses: taiki-e/install-action@cargo-udeps
      - name: Check unused dependencies
        run: cargo +nightly udeps --workspace --all-targets --all-features

  llvm-cov:
    name: Coverage (cargo llvm-cov)
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Coverage summary
        run: cargo llvm-cov --workspace --all-features --all-targets --summary-only

  taplo:
    name: Taplo
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install taplo
        uses: taiki-e/install-action@taplo-cli
      - name: Check TOML formatting
        run: taplo fmt --check

  typos:
    name: Typos
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install typos
        uses: taiki-e/install-action@typos-cli
      - name: Check typos
        run: typos

  actionlint:
    name: Actionlint
    needs: changed-files
    if: needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/actionlint@v1

  ci-success:
    name: CI passed
    if: always()
    runs-on: ubuntu-latest
    needs: [fmt, clippy, build, test, no-default-features, doc, msrv, audit, deny, machete, hack, udeps, llvm-cov, taplo, typos, actionlint]
    permissions:
      contents: none
    steps:
      - name: Check all jobs passed
        run: |
          echo "fmt:      ${{ needs.fmt.result }}"
          echo "clippy:   ${{ needs.clippy.result }}"
          echo "build:    ${{ needs.build.result }}"
          echo "test:     ${{ needs.test.result }}"
          echo "no_def:   ${{ needs.no-default-features.result }}"
          echo "doc:      ${{ needs.doc.result }}"
          echo "msrv:     ${{ needs.msrv.result }}"
          echo "audit:    ${{ needs.audit.result }}"
          echo "deny:     ${{ needs.deny.result }}"
          echo "machete:  ${{ needs.machete.result }}"
          echo "hack:     ${{ needs.hack.result }}"
          echo "udeps:    ${{ needs.udeps.result }}"
          echo "llvm-cov: ${{ needs.llvm-cov.result }}"
          echo "taplo:    ${{ needs.taplo.result }}"
          echo "typos:    ${{ needs.typos.result }}"
          echo "actlint:  ${{ needs.actionlint.result }}"
          # skipped jobs (no changes) count as success
          for r in "${{ needs.fmt.result }}" "${{ needs.clippy.result }}" "${{ needs.build.result }}" "${{ needs.test.result }}" "${{ needs.no-default-features.result }}" "${{ needs.doc.result }}" "${{ needs.msrv.result }}" "${{ needs.audit.result }}" "${{ needs.deny.result }}" "${{ needs.machete.result }}" "${{ needs.hack.result }}" "${{ needs.udeps.result }}" "${{ needs.llvm-cov.result }}" "${{ needs.taplo.result }}" "${{ needs.typos.result }}" "${{ needs.actionlint.result }}"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::Job with result '$r' failed"
              exit 1
            fi
          done
          echo "All checks passed"
