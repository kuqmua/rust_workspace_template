name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_NET_TIMEOUT: 60
  RUSTFLAGS: "-D warnings -D unreachable_pub -D dead_code"
  RUSTDOCFLAGS: "-D warnings"
  RUST_BACKTRACE: short

jobs:
  changed-files:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      ci: ${{ steps.filter.outputs.ci }}
      fast: ${{ steps.modes.outputs.fast }}
      full: ${{ steps.modes.outputs.full }}
      force_full: ${{ steps.modes.outputs.force_full }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050
        id: filter
        with:
          filters: |
            rust:
              - '**/*.rs'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - 'rust-toolchain.toml'
              - '.cargo/config.toml'
              - '.config/nextest.toml'
              - 'deny.toml'
            ci:
              - '.github/workflows/**'
      - id: modes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] || { [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_name }}" = "develop" ]; }; then
            echo "fast=true" >> "$GITHUB_OUTPUT"
          else
            echo "fast=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ] || { [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_name }}" = "main" ]; }; then
            echo "full=true" >> "$GITHUB_OUTPUT"
          else
            echo "full=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "force_full=true" >> "$GITHUB_OUTPUT"
          else
            echo "force_full=false" >> "$GITHUB_OUTPUT"
          fi

  fmt:
    name: Formatting
    needs: changed-files
    if: (needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true') && needs.changed-files.outputs.fast == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    needs: changed-files
    if: (needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true') && needs.changed-files.outputs.fast == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, nightly]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          cache-on-failure: true
          key: clippy-${{ matrix.toolchain }}
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    needs: [changed-files, clippy]
    if: (needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true') && needs.changed-files.outputs.fast == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          cache-on-failure: true
      - name: Install nextest
        uses: taiki-e/install-action@024e8cba30d328c34bf69b86cfaaaad61ad5c4cb
      - name: Test
        run: cargo nextest run --all-targets --all-features --profile ci
        env:
          RUSTFLAGS: "-D warnings"
      - name: Doc tests
        run: cargo test --doc --all-features

  no-default-features:
    name: No default features
    needs: changed-files
    if: (needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true') && needs.changed-files.outputs.fast == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, nightly]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          cache-on-failure: true
          key: no-default-features-${{ matrix.toolchain }}
      - name: Check without default features (${{ matrix.toolchain }})
        run: cargo check --workspace --all-targets --no-default-features
      - name: Test without default features (${{ matrix.toolchain }})
        run: cargo test --workspace --all-targets --no-default-features

  taplo:
    name: Taplo
    needs: changed-files
    if: (needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true') && needs.changed-files.outputs.fast == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install taplo
        uses: taiki-e/install-action@5292d65c95e72dc79f25946b7ce34e28deecf2f3
      - name: Check TOML formatting
        run: taplo fmt --check

  typos:
    name: Typos
    needs: changed-files
    if: (needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true') && needs.changed-files.outputs.fast == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install typos
        uses: taiki-e/install-action@dc6aaebcb47625f80d5dada4c7fbf1dc3e7e257a
      - name: Check typos
        run: typos

  actionlint:
    name: Actionlint
    needs: changed-files
    if: needs.changed-files.outputs.ci == 'true' && needs.changed-files.outputs.fast == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca

  build:
    name: Build
    needs: changed-files
    if: ((needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true') || needs.changed-files.outputs.force_full == 'true') && needs.changed-files.outputs.full == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, nightly]
        profile: [dev, release]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          cache-on-failure: true
          key: build-${{ matrix.toolchain }}-${{ matrix.profile }}
      - name: Build (${{ matrix.toolchain }}, ${{ matrix.profile }})
        run: cargo build --all-targets --all-features ${{ matrix.profile == 'release' && '--release' || '' }}
      - name: Upload artifacts (release)
        if: matrix.profile == 'release' && matrix.toolchain == 'nightly'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-binaries
          path: target/release/*server*
          if-no-files-found: warn
          retention-days: 7

  doc:
    name: Docs
    needs: changed-files
    if: ((needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true') || needs.changed-files.outputs.force_full == 'true') && needs.changed-files.outputs.full == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Check docs
        run: cargo doc --all-features --no-deps --document-private-items

  msrv:
    name: MSRV
    needs: changed-files
    if: ((needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true') || needs.changed-files.outputs.force_full == 'true') && needs.changed-files.outputs.full == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@c93f4f9c67595668add93d3d6895795ce52d8c2d
      - name: Check MSRV
        run: cargo check --all-features

  audit:
    name: Security audit
    needs: changed-files
    if: ((needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true') || needs.changed-files.outputs.force_full == 'true') && needs.changed-files.outputs.full == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: Cargo deny
    needs: changed-files
    if: ((needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true') || needs.changed-files.outputs.force_full == 'true') && needs.changed-files.outputs.full == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - name: Install cargo-deny
        uses: taiki-e/install-action@43d63066c313f326186510e6e5feab4dd2391cfd
      - name: Cargo deny checks
        run: cargo deny check advisories bans licenses sources

  machete:
    name: Unused deps
    needs: changed-files
    if: ((needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true') || needs.changed-files.outputs.force_full == 'true') && needs.changed-files.outputs.full == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2
      - name: Install cargo-machete
        uses: taiki-e/install-action@59979a424d2584f3cdeca89833d69ca54b72d84f
      - run: cargo machete

  check-semver:
    name: Semver check
    needs: changed-files
    if: github.event_name == 'pull_request' && (needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2
      - uses: obi1kenobi/cargo-semver-checks-action@6b69fcf40e9b5fb17adeb57e4b6ecd020649a239

  hack:
    name: Feature matrix (cargo hack)
    needs: changed-files
    if: ((needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true') || needs.changed-files.outputs.force_full == 'true') && needs.changed-files.outputs.full == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - name: Install cargo-hack
        uses: taiki-e/install-action@a8bfb6e9b2cf3cefc208e6a18507d78669d398ab
      - name: Check feature matrix
        run: cargo hack check --workspace --all-targets --feature-powerset --no-dev-deps

  udeps:
    name: Unused deps (cargo udeps)
    needs: changed-files
    if: ((needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true') || needs.changed-files.outputs.force_full == 'true') && needs.changed-files.outputs.full == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2
      - name: Install cargo-udeps
        uses: taiki-e/install-action@b11d693c7febff734da6b5acd9cea3cbb8596ddd
      - name: Check unused dependencies
        run: cargo +nightly udeps --workspace --all-targets --all-features

  llvm-cov:
    name: Coverage (cargo llvm-cov)
    needs: changed-files
    if: ((needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true') || needs.changed-files.outputs.force_full == 'true') && needs.changed-files.outputs.full == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@87d97b95c884523e049410b5322ea91b2acdbc89
      - name: Coverage summary
        run: cargo llvm-cov --workspace --all-features --all-targets --summary-only

  ci-success:
    name: CI passed
    if: always()
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, no-default-features, taplo, typos, actionlint, build, doc, msrv, audit, deny, machete, check-semver, hack, udeps, llvm-cov]
    permissions:
      contents: none
    steps:
      - name: Check all jobs passed
        run: |
          echo "fmt:      ${{ needs.fmt.result }}"
          echo "clippy:   ${{ needs.clippy.result }}"
          echo "test:     ${{ needs.test.result }}"
          echo "no_def:   ${{ needs.no-default-features.result }}"
          echo "taplo:    ${{ needs.taplo.result }}"
          echo "typos:    ${{ needs.typos.result }}"
          echo "actlint:  ${{ needs.actionlint.result }}"
          echo "build:    ${{ needs.build.result }}"
          echo "doc:      ${{ needs.doc.result }}"
          echo "msrv:     ${{ needs.msrv.result }}"
          echo "audit:    ${{ needs.audit.result }}"
          echo "deny:     ${{ needs.deny.result }}"
          echo "machete:  ${{ needs.machete.result }}"
          echo "semver:   ${{ needs.check-semver.result }}"
          echo "hack:     ${{ needs.hack.result }}"
          echo "udeps:    ${{ needs.udeps.result }}"
          echo "llvm-cov: ${{ needs.llvm-cov.result }}"
          for result in "${{ needs.fmt.result }}" "${{ needs.clippy.result }}" "${{ needs.test.result }}" "${{ needs.no-default-features.result }}" "${{ needs.taplo.result }}" "${{ needs.typos.result }}" "${{ needs.actionlint.result }}" "${{ needs.build.result }}" "${{ needs.doc.result }}" "${{ needs.msrv.result }}" "${{ needs.audit.result }}" "${{ needs.deny.result }}" "${{ needs.machete.result }}" "${{ needs.check-semver.result }}" "${{ needs.hack.result }}" "${{ needs.udeps.result }}" "${{ needs.llvm-cov.result }}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "::error::Job with result '$result' failed"
              exit 1
            fi
          done
          echo "All checks passed"
