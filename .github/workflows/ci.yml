name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_NET_TIMEOUT: 60
  RUSTFLAGS: "-D warnings -D unreachable_pub -D dead_code"
  RUSTDOCFLAGS: "-D warnings"
  RUST_BACKTRACE: short

jobs:
  changed-files:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050
        id: filter
        with:
          filters: |
            rust:
              - '**/*.rs'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - 'rust-toolchain.toml'
              - '.cargo/config.toml'
              - 'deny.toml'
            ci:
              - '.github/workflows/**'
  fmt:
    name: cargo fmt
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2
        with:
          components: rustfmt
      - run: cargo fmt

  clippy:
    name: cargo clippy --all-targets --all-features -- -D warnings
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        toolchain: [nightly]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          cache-on-failure: true
          key: clippy-${{ matrix.toolchain }}
      - name: cargo clippy --all-targets --all-features -- -D warnings
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: cargo test
    needs: [changed-files, clippy]
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          cache-on-failure: true
      - name: cargo test
        run: cargo test
        env:
          RUSTFLAGS: "-D warnings"

  taplo:
    name: taplo fmt --check
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install taplo
        uses: taiki-e/install-action@5292d65c95e72dc79f25946b7ce34e28deecf2f3
      - name: taplo fmt --check
        run: taplo fmt --check

  typos:
    name: typos
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install typos
        uses: taiki-e/install-action@dc6aaebcb47625f80d5dada4c7fbf1dc3e7e257a
      - name: typos
        run: typos

  actionlint:
    name: actionlint
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca

  audit:
    name: rustsec/audit-check
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: cargo deny check advisories bans licenses sources
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - name: Install cargo-deny
        uses: taiki-e/install-action@43d63066c313f326186510e6e5feab4dd2391cfd
      - name: cargo deny check advisories bans licenses sources
        run: cargo deny check advisories bans licenses sources

  machete:
    name: cargo machete
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2
      - name: Install cargo-machete
        uses: taiki-e/install-action@59979a424d2584f3cdeca89833d69ca54b72d84f
      - run: cargo machete

  check-semver:
    name: cargo-semver-checks-action
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2
      - uses: obi1kenobi/cargo-semver-checks-action@6b69fcf40e9b5fb17adeb57e4b6ecd020649a239

  hack:
    name: cargo hack check --workspace --feature-powerset --no-dev-deps
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - name: Install cargo-hack
        uses: taiki-e/install-action@a8bfb6e9b2cf3cefc208e6a18507d78669d398ab
      - name: cargo hack check --workspace --feature-powerset --no-dev-deps
        run: cargo hack check --workspace --feature-powerset --no-dev-deps

  udeps:
    name: cargo +nightly udeps --workspace --all-targets --all-features
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2
      - name: Install cargo-udeps
        uses: taiki-e/install-action@b11d693c7febff734da6b5acd9cea3cbb8596ddd
      - name: cargo +nightly udeps --workspace --all-targets --all-features
        run: cargo +nightly udeps --workspace --all-targets --all-features

  llvm-cov:
    name: cargo llvm-cov --workspace --all-features --all-targets --summary-only
    needs: changed-files
    if: needs.changed-files.outputs.rust == 'true' || needs.changed-files.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@87d97b95c884523e049410b5322ea91b2acdbc89
      - name: cargo llvm-cov --workspace --all-features --all-targets --summary-only
        run: cargo llvm-cov --workspace --all-features --all-targets --summary-only

  ci-success:
    name: CI result summary
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [fmt, clippy, test, taplo, typos, actionlint, audit, deny, machete, check-semver, hack, udeps, llvm-cov]
    permissions:
      contents: none
    steps:
      - name: Check all jobs passed
        run: |
          echo "fmt:      ${{ needs.fmt.result }}"
          echo "clippy:   ${{ needs.clippy.result }}"
          echo "test:     ${{ needs.test.result }}"
          echo "taplo:    ${{ needs.taplo.result }}"
          echo "typos:    ${{ needs.typos.result }}"
          echo "actlint:  ${{ needs.actionlint.result }}"
          echo "audit:    ${{ needs.audit.result }}"
          echo "deny:     ${{ needs.deny.result }}"
          echo "machete:  ${{ needs.machete.result }}"
          echo "semver:   ${{ needs.check-semver.result }}"
          echo "hack:     ${{ needs.hack.result }}"
          echo "udeps:    ${{ needs.udeps.result }}"
          echo "llvm-cov: ${{ needs.llvm-cov.result }}"
          for result in "${{ needs.fmt.result }}" "${{ needs.clippy.result }}" "${{ needs.test.result }}" "${{ needs.taplo.result }}" "${{ needs.typos.result }}" "${{ needs.actionlint.result }}" "${{ needs.audit.result }}" "${{ needs.deny.result }}" "${{ needs.machete.result }}" "${{ needs.check-semver.result }}" "${{ needs.hack.result }}" "${{ needs.udeps.result }}" "${{ needs.llvm-cov.result }}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "::error::Job with result '$result' failed"
              exit 1
            fi
          done
          echo "All checks passed"
